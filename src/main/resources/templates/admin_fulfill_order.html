<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fulfill Order</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Fulfill Order</h2>

    <div class="card">
        <p><strong>Name:</strong> <span th:text="${order.customerName}"></span></p>
        <p><strong>Qty:</strong> <span th:text="${order.quantity}"></span></p>
        <p><strong>Pickup Date:</strong> <span th:text="${order.formattedPickupDate}"></span></p>
        <p><strong>Pickup Time:</strong> <span th:text="${order.formattedPickupTime}"></span></p>
        <p th:if="${order.hasNotes()}"><strong>Notes:</strong> <span th:text="${order.notes}"></span></p>
    </div>

    <form class="form" method="post" th:action="@{'/admin/orders/' + ${order.id} + '/fulfill'}">
        <label>Total Bird Weight (lbs)</label>
        <input type="number" name="totalWeight" min="0" step="0.01" required>

        <label>Total Price ($)</label>
        <input type="number" name="totalPrice" min="0" step="0.01" required>

        <label>Payment Method</label>
        <select name="paymentMethod" required>
            <option value="">Select payment method</option>
            <option value="CASH">Cash</option>
            <option value="CHECK">Check</option>
        </select>

        <button class="order-button" type="submit">Save Fulfilled Sale</button>
    </form>

    <a class="link" href="/admin/orders">Back to Orders</a>
</div>
</body>
</html>
