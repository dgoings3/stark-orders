<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Fulfilled Sale</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Edit Fulfilled Sale</h2>

    <div class="card">
        <p><strong>Name:</strong> <span th:text="${order.customerName}"></span></p>
        <p><strong>Qty:</strong> <span th:text="${order.quantity}"></span></p>
        <p><strong>Status:</strong> <span th:text="${order.status}"></span></p>
    </div>

    <form class="form" method="post" th:action="@{'/admin/orders/' + ${order.id} + '/edit-sale'}">
        <label>Total Bird Weight (lbs)</label>
        <input type="number" name="totalWeight" min="0" step="0.01" th:value="${order.totalWeight}" required>

        <label>Total Price ($)</label>
        <input type="number" name="totalPrice" min="0" step="0.01" th:value="${order.totalPrice}" required>

        <label>Payment Method</label>
        <select name="paymentMethod" required>
            <option value="CASH" th:selected="${order.paymentMethod == 'CASH'}">Cash</option>
            <option value="CHECK" th:selected="${order.paymentMethod == 'CHECK'}">Check</option>
        </select>

        <button class="order-button" type="submit">Save Changes</button>
    </form>

    <a class="link" href="/admin/history">Back to History</a>
</div>
</body>
</html>
