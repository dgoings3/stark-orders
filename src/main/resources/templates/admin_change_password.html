<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Change Admin Password</h2>

    <p th:if="${error}" style="color:#b00020; font-weight:600;" th:text="${error}"></p>
    <p th:if="${success}" style="color:green; font-weight:600;" th:text="${success}"></p>

    <form class="form" method="post" th:action="@{/admin/change-password}">
        <label>Current Password</label>
        <input type="password" name="currentPassword" required>

        <label>New Password</label>
        <input type="password" name="newPassword" required>

        <label>Confirm New Password</label>
        <input type="password" name="confirmPassword" required>

        <button class="order-button" type="submit">Change Password</button>
    </form>

    <a class="link" href="/admin/dashboard">Back to Dashboard</a>
</div>
</body>
</html>
