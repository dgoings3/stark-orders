<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order History</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Order History</h2>

    <a class="link" href="/admin/orders">Active Orders</a>
    <a class="link" href="/admin/dashboard" style="margin-left:12px;">Dashboard</a>
    <a class="link" href="/admin/inventory" style="margin-left:12px;">Inventory</a>

    <div th:if="${#lists.isEmpty(orders)}" class="card" style="margin-top:14px;">
        <p>No fulfilled or canceled orders yet.</p>
    </div>

    <div th:each="o : ${orders}" class="card" style="margin-top:14px;">
        <p><strong>Name:</strong> <span th:text="${o.customerName}"></span></p>
        <p><strong>Phone:</strong> <span th:text="${o.phone}"></span></p>
        <p><strong>Qty:</strong> <span th:text="${o.quantity}"></span></p>
        <p><strong>Pickup Date:</strong> <span th:text="${o.formattedPickupDate}"></span></p>
        <p><strong>Pickup Time:</strong> <span th:text="${o.formattedPickupTime}"></span></p>
        <p th:if="${o.hasNotes()}"><strong>Notes:</strong> <span th:text="${o.notes}"></span></p>
        <p><strong>Source:</strong> <span th:text="${o.source}"></span></p>
        <p><strong>Status:</strong> <span th:text="${o.status}"></span></p>

        <p th:if="${o.totalWeight != null}">
            <strong>Total Weight:</strong> <span th:text="${#numbers.formatDecimal(o.totalWeight, 1, 2)}"></span> lbs
        </p>

        <p th:if="${o.totalPrice != null}">
            <strong>Total Price:</strong> $<span th:text="${#numbers.formatDecimal(o.totalPrice, 1, 2)}"></span>
        </p>

        <p th:if="${o.paymentMethod != null and !o.paymentMethod.isEmpty()}">
            <strong>Payment:</strong> <span th:text="${o.paymentMethod}"></span>
        </p>

        <form th:if="${o.status.name() == 'FULFILLED'}"
              th:action="@{'/admin/orders/' + ${o.id} + '/edit-sale'}"
              method="get"
              style="margin-top:10px;">
            <button class="order-button" type="submit">Edit Fulfilled Sale</button>
        </form>

        <form th:if="${o.status.name() == 'CANCELED' or o.status.name() == 'FULFILLED'}"
              th:action="@{'/admin/orders/' + ${o.id} + '/delete'}"
              method="post"
              style="margin-top:10px;">
            <button class="order-button" type="submit" style="background:#444;">Delete</button>
        </form>
    </div>
</div>
</body>
</html>
