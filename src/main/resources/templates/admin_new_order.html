<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manual Reservation</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Manual Reservation</h2>

    <p><strong>Remaining birds:</strong> <span th:text="${remaining}">0</span></p>

    <p th:if="${error}" style="color:#b00020; font-weight:600;" th:text="${error}"></p>

    <form class="form" method="post" th:action="@{/admin/order/new}">
        <label>Customer Name</label>
        <input type="text" name="customerName" required>

        <label>Quantity</label>
        <input type="number" min="1" name="quantity" value="1" required>

        <button class="order-button" type="submit">Save Manual Reservation</button>
    </form>

    <a class="link" href="/admin/orders">Back to Orders</a>
</div>
</body>
</html>
